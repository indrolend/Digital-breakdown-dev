<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
  <meta name="theme-color" content="#020803">
  <title>Digital Breakdown · Native Web</title>
  <style>
    * { box-sizing: border-box; }
    html, body { width: 100%; height: 100%; margin: 0; overflow: hidden; background: #020803; color: #b8ffc4; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
    canvas { display: block; width: 100%; height: 100%; touch-action: none; }
    #status { position: fixed; top: 10px; left: 12px; z-index: 4; font-size: 11px; opacity: .85; pointer-events: none; }
    #controls { position: fixed; inset: 0; z-index: 3; pointer-events: none; }
    .pad, .buttons { position: absolute; bottom: max(18px, env(safe-area-inset-bottom)); pointer-events: auto; touch-action: none; }
    .pad { left: 18px; width: 132px; height: 132px; border: 1px solid rgba(184,255,196,.35); }
    .stick { position: absolute; width: 42px; height: 42px; left: 45px; top: 45px; border: 1px solid rgba(184,255,196,.8); background: rgba(184,255,196,.1); }
    .buttons { right: 18px; display: grid; grid-template-columns: repeat(3, 54px); gap: 8px; }
    button { height: 48px; border-radius: 0; border: 1px solid rgba(184,255,196,.55); background: rgba(2,8,3,.72); color: #b8ffc4; font: inherit; }
    button.active { background: rgba(184,255,196,.22); }
    @media (pointer:fine) { .pad, .buttons { opacity: .45; } }
  </style>
</head>
<body>
  <canvas id="canvas" tabindex="0" aria-label="Digital Breakdown native runtime"></canvas>
  <div id="status">LOADING NATIVE C++ RUNTIME</div>
  <div id="controls">
    <div id="pad" class="pad"><div id="stick" class="stick"></div></div>
    <div class="buttons">
      <button data-action="vacuum">VAC</button>
      <button data-action="jump">JUMP</button>
      <button data-action="melee">HIT</button>
      <button data-action="sprint">RUN</button>
      <button data-action="shoot">SHOT</button>
      <button data-action="camera">CAM</button>
    </div>
  </div>
  <script src="./digital-breakdown.js"></script>
  <script>
    const canvas = document.getElementById('canvas');
    const status = document.getElementById('status');
    const pad = document.getElementById('pad');
    const stick = document.getElementById('stick');
    const state = { moveX: 0, moveZ: 0, lookX: 0, lookY: 0, vacuum: 0, sprint: 0, jump: 0, melee: 0, shoot: 0, camera: 0 };
    const androidKeys = { KeyW:51, KeyA:29, KeyS:47, KeyD:32, KeyQ:45, KeyC:31, KeyF:34, ShiftLeft:59, ShiftRight:60, Space:62 };
    let api = null;
    let last = performance.now();
    let lookPointer = null;
    let lookX = 0;
    let lookY = 0;
    let padPointer = null;

    function resize() {
      const dpr = Math.min(devicePixelRatio || 1, 2);
      const width = Math.max(1, Math.round(innerWidth * dpr));
      const height = Math.max(1, Math.round(innerHeight * dpr));
      if (canvas.width !== width || canvas.height !== height) {
        canvas.width = width;
        canvas.height = height;
        if (api) api.resize(width, height);
      }
    }

    function sendControls() {
      if (!api) return;
      api.touch(state.moveX, state.moveZ, state.lookX, state.lookY, state.vacuum, state.sprint, state.jump, state.melee, state.shoot, state.camera);
      state.lookX = state.lookY = 0;
      state.jump = state.melee = state.shoot = state.camera = 0;
    }

    const presentationStepMs = 1000 / 60;
    let nextPresentation = 0;

    function frame(now) {
      requestAnimationFrame(frame);
      if (!nextPresentation) nextPresentation = now;
      if (now < nextPresentation) return;
      do { nextPresentation += presentationStepMs; } while (nextPresentation <= now);
      resize();
      const dt = Math.min((now - last) / 1000, 0.25);
      last = now;
      sendControls();
      if (api) api.frame(dt);
    }

    addEventListener('keydown', event => {
      const code = androidKeys[event.code];
      if (code !== undefined && api) { event.preventDefault(); api.key(code, 1); }
    });
    addEventListener('keyup', event => {
      const code = androidKeys[event.code];
      if (code !== undefined && api) { event.preventDefault(); api.key(code, 0); }
    });

    canvas.addEventListener('pointerdown', event => {
      if (event.pointerType === 'mouse' && event.button === 0) state.vacuum = 1;
      lookPointer = event.pointerId;
      lookX = event.clientX;
      lookY = event.clientY;
      canvas.setPointerCapture(event.pointerId);
      canvas.focus();
    });
    canvas.addEventListener('pointermove', event => {
      if (event.pointerId !== lookPointer) return;
      state.lookX += event.clientX - lookX;
      state.lookY += event.clientY - lookY;
      lookX = event.clientX;
      lookY = event.clientY;
    });
    canvas.addEventListener('pointerup', event => {
      if (event.pointerId === lookPointer) lookPointer = null;
      if (event.pointerType === 'mouse' && event.button === 0) state.vacuum = 0;
    });
    canvas.addEventListener('contextmenu', event => event.preventDefault());

    function updatePad(event) {
      const r = pad.getBoundingClientRect();
      const x = Math.max(-1, Math.min(1, (event.clientX - (r.left + r.width / 2)) / (r.width * .38)));
      const y = Math.max(-1, Math.min(1, (event.clientY - (r.top + r.height / 2)) / (r.height * .38)));
      state.moveX = x;
      state.moveZ = -y;
      stick.style.transform = `translate(${x * 38}px, ${y * 38}px)`;
    }
    pad.addEventListener('pointerdown', event => { padPointer = event.pointerId; pad.setPointerCapture(event.pointerId); updatePad(event); });
    pad.addEventListener('pointermove', event => { if (event.pointerId === padPointer) updatePad(event); });
    pad.addEventListener('pointerup', event => { if (event.pointerId === padPointer) { padPointer = null; state.moveX = state.moveZ = 0; stick.style.transform = ''; } });

    document.querySelectorAll('button[data-action]').forEach(button => {
      const action = button.dataset.action;
      const held = action === 'vacuum' || action === 'sprint';
      button.addEventListener('pointerdown', event => { event.preventDefault(); state[action] = 1; button.classList.add('active'); button.setPointerCapture(event.pointerId); });
      const release = () => { if (held) state[action] = 0; button.classList.remove('active'); };
      button.addEventListener('pointerup', release);
      button.addEventListener('pointercancel', release);
    });

    createDigitalBreakdown({ canvas }).then(Module => {
      api = {
        init: Module.cwrap('db_init', 'number', ['string']),
        resize: Module.cwrap('db_resize', null, ['number','number']),
        frame: Module.cwrap('db_frame', null, ['number']),
        key: Module.cwrap('db_key', null, ['number','number']),
        touch: Module.cwrap('db_touch_controls', null, ['number','number','number','number','number','number','number','number','number','number']),
        commit: Module.cwrap('db_source_commit', 'string', [])
      };
      if (!api.init('#canvas')) throw new Error('WebGL context creation failed');
      resize();
      status.textContent = `NATIVE C++ · ${api.commit().slice(0, 12)} · WASD / SHIFT / SPACE / F / Q / C`;
    }).catch(error => {
      console.error(error);
      status.textContent = `NATIVE BUILD FAILED: ${error.message}`;
    });

    addEventListener('resize', resize);
    requestAnimationFrame(frame);
  </script>
</body>
</html>
